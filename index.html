<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>BotMind</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --border: #2a2a3d; --accent: #7c6aff; --accent2: #ff6ab0;
    --text: #e8e8f0; --muted: #6b6b85; --green: #4fffb0;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; display: flex; overflow: hidden; }
  .blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.07; pointer-events: none; }
  .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -100px; }
  .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; }
  .app { display: flex; height: 100vh; width: 100%; position: relative; z-index: 1; }

  /* SIDEBAR */
  .sidebar { width: 320px; min-width: 320px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .sidebar-header { padding: 22px 20px 14px; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .logo-sub { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.12em; text-transform: uppercase; }
  .tabs { display: flex; padding: 10px 14px; gap: 6px; border-bottom: 1px solid var(--border); }
  .tab { flex: 1; padding: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.06em; transition: all 0.2s; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: white; }
  .tab:hover:not(.active) { color: var(--accent); border-color: var(--accent); }
  .tab-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .panel.active { display: flex; }

  /* TRAIN */
  .train-form { padding: 16px; display: flex; flex-direction: column; gap: 11px; }
  .field label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px; }
  .field input, .field textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 9px 12px; border-radius: 6px; outline: none; resize: none; transition: border-color 0.2s; }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { height: 68px; }
  .btn-train { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; border: none; padding: 11px; border-radius: 6px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; transition: opacity 0.2s, transform 0.15s; letter-spacing: 0.04em; }
  .btn-train:hover { opacity: 0.88; transform: translateY(-1px); }
  .toast { margin: 0 16px; padding: 9px 13px; border-radius: 6px; font-size: 12px; display: none; }
  .toast.success { background: rgba(79,255,176,0.1); border: 1px solid rgba(79,255,176,0.3); color: var(--green); display: block; }
  .toast.error { background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3); color: #ff8080; display: block; }

  /* INTENTS */
  .intents-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .intents-list::-webkit-scrollbar { width: 3px; }
  .intents-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .intent-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 11px 12px; position: relative; transition: border-color 0.2s; }
  .intent-card:hover { border-color: var(--accent); }
  .intent-tag { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; }
  .intent-chips { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 6px; }
  .chip { padding: 2px 7px; border-radius: 20px; font-size: 10px; background: rgba(124,106,255,0.1); border: 1px solid rgba(124,106,255,0.2); color: var(--accent); }
  .intent-meta { font-size: 10px; color: var(--muted); margin-top: 5px; }
  .btn-del { position: absolute; top: 9px; right: 10px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 17px; line-height: 1; transition: color 0.2s; }
  .btn-del:hover { color: #ff8080; }
  .btn-refresh { width: calc(100% - 28px); margin: 10px 14px; padding: 9px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.2s; }
  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

  /* CHAT */
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chat-header { padding: 18px 26px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 17px; }
  .chat-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
  .chat-status { font-size: 10px; color: var(--green); display: flex; align-items: center; gap: 5px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  .messages { flex: 1; overflow-y: auto; padding: 22px 26px; display: flex; flex-direction: column; gap: 14px; }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .msg { display: flex; gap: 9px; max-width: 74%; animation: up 0.22s ease; }
  @keyframes up { from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)} }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
  .msg.bot .msg-av { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg.user .msg-av { background: var(--surface2); border: 1px solid var(--border); }
  .bubble { padding: 11px 15px; border-radius: 13px; font-size: 14px; line-height: 1.5; }
  .msg.bot .bubble { background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.user .bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
  .msg-tag { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 3px; padding: 0 3px; }
  .typing-row { display: none; gap: 9px; padding: 0 26px 6px; align-items: center; }
  .typing-row.show { display: flex; }
  .typing-bubble { padding: 11px 15px; background: var(--surface2); border: 1px solid var(--border); border-radius: 13px; border-bottom-left-radius: 4px; display: flex; gap: 4px; align-items: center; }
  .dot-t { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; }
  .dot-t:nth-child(2){animation-delay:0.2s}.dot-t:nth-child(3){animation-delay:0.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
  .input-area { padding: 14px 26px; border-top: 1px solid var(--border); }
  .input-row { display: flex; gap: 9px; align-items: flex-end; }
  #userInput { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 11px 15px; border-radius: 10px; outline: none; resize: none; max-height: 110px; line-height: 1.4; transition: border-color 0.2s; }
  #userInput:focus { border-color: var(--accent); }
  #userInput::placeholder { color: var(--muted); }
  .btn-send { width: 44px; height: 44px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s, transform 0.15s; flex-shrink: 0; }
  .btn-send:hover { opacity: 0.88; transform: scale(1.04); }
  .hint { font-size: 10px; color: var(--muted); margin-top: 7px; }
  .empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--muted); }
  .empty-icon { font-size:44px; opacity:0.25; }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">BotMind</div>
      <div class="logo-sub">Train · Chat · Learn</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('train')">Train</button>
      <button class="tab" onclick="switchTab('intents')">Intents</button>
    </div>
    <div class="tab-content">
      <div class="panel active" id="panel-train">
        <div class="train-form">
          <div class="field"><label>Intent Tag</label><input id="tag" placeholder="e.g. greeting, joke, weather" /></div>
          <div class="field"><label>Trigger Pattern</label><input id="pattern" placeholder="e.g. tell me a joke" /></div>
          <div class="field"><label>Bot Response</label><textarea id="response" placeholder="What the bot should reply…"></textarea></div>
          <button class="btn-train" onclick="trainBot()">⚡ Train Bot</button>
        </div>
        <div class="toast" id="toast"></div>
      </div>
      <div class="panel" id="panel-intents">
        <div class="intents-list" id="intentsList"><div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">Click refresh to load intents</div></div>
        <button class="btn-refresh" onclick="loadIntents()">↻ Refresh Intents</button>
      </div>
    </div>
  </aside>

  <main class="chat-area">
    <div class="chat-header">
      <div class="avatar">🤖</div>
      <div>
        <div class="chat-title">Jatin's Bot</div>
        <div class="chat-status"><span class="dot"></span> Online · localhost:5000</div>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="empty" id="emptyState">
        <div class="empty-icon">💬</div>
        <div style="font-family:'Syne',sans-serif;font-size:13px">Start a conversation</div>
        <div style="font-size:11px">Train intents from the sidebar →</div>
      </div>
    </div>
    <div class="typing-row" id="typing">
      <div class="msg-av" style="background:linear-gradient(135deg,var(--accent),var(--accent2));width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px">🤖</div>
      <div class="typing-bubble"><div class="dot-t"></div><div class="dot-t"></div><div class="dot-t"></div></div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="userInput" rows="1" placeholder="Type a message…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="hint">Enter to send · Shift+Enter new line</div>
    </div>
  </main>
</div>
<script>
const API = 'http://localhost:5000';
const userId = 'user_' + Date.now();

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['train','intents'][i]===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  if(t==='intents') loadIntents();
}
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }
function addMsg(text, role, tag) {
  document.getElementById('emptyState')?.remove();
  const msgs = document.getElementById('messages');
  const d = document.createElement('div'); d.className=`msg ${role}`;
  d.innerHTML=`<div class="msg-av">${role==='bot'?'🤖':'🧑'}</div><div><div class="bubble">${text}</div>${tag?`<div class="msg-tag">intent: ${tag}</div>`:''}</div>`;
  msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight;
}
async function sendMessage() {
  const inp=document.getElementById('userInput'); const text=inp.value.trim(); if(!text)return;
  addMsg(text,'user'); inp.value=''; inp.style.height='auto';
  document.getElementById('typing').classList.add('show');
  document.getElementById('messages').scrollTop=99999;
  try {
    const r=await fetch(`${API}/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,userId})});
    const d=await r.json(); document.getElementById('typing').classList.remove('show');
    addMsg(d.reply,'bot',d.tag);
  } catch { document.getElementById('typing').classList.remove('show'); addMsg('⚠️ Server unreachable. Run: node server.js','bot'); }
}
function showToast(msg,type) {
  const t=document.getElementById('toast'); t.textContent=(type==='success'?'✓ ':'✗ ')+msg; t.className=`toast ${type}`;
  setTimeout(()=>t.className='toast',3000);
}
async function trainBot() {
  const tag=document.getElementById('tag').value.trim();
  const pattern=document.getElementById('pattern').value.trim();
  const response=document.getElementById('response').value.trim();
  if(!tag||!pattern||!response){showToast('All fields required!','error');return;}
  try {
    const r=await fetch(`${API}/train`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tag,pattern,response})});
    const d=await r.json();
    if(r.ok){showToast('Bot trained! 🎉','success');document.getElementById('pattern').value='';document.getElementById('response').value='';}
    else showToast(d.error||'Failed','error');
  } catch { showToast('Server unreachable','error'); }
}
async function loadIntents() {
  const list=document.getElementById('intentsList');
  list.innerHTML='<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">Loading…</div>';
  try {
    const r=await fetch(`${API}/intents`); const intents=await r.json();
    if(!intents.length){list.innerHTML='<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">No intents yet</div>';return;}
    list.innerHTML='';
    intents.forEach(i=>{
      const c=document.createElement('div'); c.className='intent-card';
      c.innerHTML=`<button class="btn-del" onclick="deleteIntent('${i.tag}')">×</button><div class="intent-tag">${i.tag}</div><div class="intent-chips">${i.patterns.map(p=>`<span class="chip">${p}</span>`).join('')}</div><div class="intent-meta">${i.responses.length} response(s)</div>`;
      list.appendChild(c);
    });
  } catch { list.innerHTML='<div style="color:#ff8080;font-size:12px;text-align:center;padding:20px">⚠️ Server unreachable</div>'; }
}
async function deleteIntent(tag) {
  if(!confirm(`Delete "${tag}"?`))return;
  try{await fetch(`${API}/intents/${tag}`,{method:'DELETE'});loadIntents();}
  catch{alert('Could not delete.');}
}
</script>
</body>
</html>
